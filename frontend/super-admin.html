<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>I.O.E</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #0f0a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .login-box {
      background: linear-gradient(135deg, #1a1f3a 0%, #150f1e 100%);
      border: 1px solid rgba(123,92,255,0.3);
      border-radius: 16px;
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 14px;
      object-fit: cover;
      border: 2px solid rgba(123,92,255,0.4);
    }
    h1 {
      font-size: 18px;
      color: #cbd5e0;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(123,92,255,0.25);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #7b5cff;
      background: rgba(123,92,255,0.08);
    }
    input::placeholder {
      color: #718096;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #7b5cff, #00e5c0);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(123,92,255,0.3);
    }
    .btn-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    .error-msg.show { display: block; }
    .rate-info {
      font-size: 11px;
      color: #718096;
      text-align: center;
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo-section">
    <img src="assets/admin-logo.png" alt="" class="logo-icon">
    <h1>Administrasi Marga Astronomi</h1>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <input type="password" id="masterKeyInput" placeholder="Master Key" autocomplete="off">
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Masuk</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <div class="rate-info" id="rateInfo"></div>
</div>

<script src="js/ioe-auth.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const input = document.getElementById('masterKeyInput');
  const submitBtn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('errorMsg');
  const rateInfoEl = document.getElementById('rateInfo');

  // Kalau sudah ada session superadmin aktif, langsung ke panel (index.html + logo admin muncul)
  (function checkExisting() {
    const sess = localStorage.getItem('ioe_superadmin_session');
    if (sess) {
      try {
        const parsed = JSON.parse(sess);
        if (parsed.token) {
          window.location.href = 'index.html';
        }
      } catch (e) {}
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const masterKey = input.value;
    errorEl.classList.remove('show');

    if (!masterKey) {
      errorEl.textContent = 'Masukkan master key';
      errorEl.classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Memproses...';

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'verify-superadmin', masterKey }),
      });
      const data = await res.json();

      if (!data.success) {
        errorEl.textContent = data.error || 'Master key salah';
        errorEl.classList.add('show');
        if (typeof data.attemptsLeft === 'number') {
          rateInfoEl.textContent = `Sisa percobaan minggu ini: ${data.attemptsLeft}`;
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
        input.value = '';
        return;
      }

      // Simpan session superadmin (permanent, tidak expire)
      localStorage.setItem('ioe_superadmin_session', JSON.stringify({
        token: data.token,
        loginAt: Date.now(),
      }));

      submitBtn.textContent = '✓ Berhasil';
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 600);

    } catch (e) {
      errorEl.textContent = 'Gagal terhubung ke server';
      errorEl.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Masuk';
    }
  });
</script>

</body>
</html>
