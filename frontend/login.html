<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — I.O.E Hub</title>
<link rel="stylesheet" href="css/global.css">
<style>
.page-wrap { padding-top:var(--nav-h); padding-bottom:60px; min-height:100vh; display:flex; align-items:center; }
.login-wrap { max-width:420px; margin:0 auto; padding:24px 20px; width:100%; }

.login-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:28px 24px;
}
.login-icon { font-size:2.5rem; text-align:center; margin-bottom:12px; }
.login-title {
  font-family:'Space Grotesk',sans-serif; font-size:1.4rem; font-weight:700;
  color:#fff; text-align:center; margin-bottom:4px;
}
.login-sub {
  font-family:'Inter',sans-serif; font-size:0.85rem; color:var(--text-muted);
  text-align:center; margin-bottom:24px;
}

.form-input {
  width:100%; padding:13px 16px; border-radius:var(--radius);
  background:var(--bg-card2); border:1px solid var(--border);
  color:var(--text); font-family:'Inter',sans-serif; font-size:0.95rem;
  outline:none; transition:border-color 0.2s; margin-bottom:12px;
  box-sizing:border-box;
}
.form-input:focus { border-color:var(--primary); }
.form-input::placeholder { color:var(--text-muted); }

.form-error {
  font-family:'Inter',sans-serif; font-size:0.8rem; color:#ff7096;
  margin-bottom:14px; display:none; padding:10px 12px;
  background:rgba(255,60,110,0.08); border:1px solid rgba(255,60,110,0.2); border-radius:8px;
}
.form-success {
  font-family:'Inter',sans-serif; font-size:0.8rem; color:var(--teal);
  margin-bottom:14px; display:none; padding:10px 12px;
  background:rgba(0,229,192,0.08); border:1px solid rgba(0,229,192,0.2); border-radius:8px;
}

.btn-primary {
  width:100%; padding:14px; border-radius:var(--radius); border:none;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:0.95rem;
  cursor:pointer; transition:opacity 0.2s;
}
.btn-primary:disabled { opacity:0.5; }

.switch-link {
  text-align:center; margin-top:18px; font-family:'Inter',sans-serif; font-size:0.85rem;
  color:var(--text-muted);
}
.switch-link a { color:var(--primary); text-decoration:none; font-weight:600; }

.session-active {
  text-align:center; padding:30px 20px;
}
.session-active .icon { font-size:2.5rem; margin-bottom:12px; }
</style>
</head>
<body>
<nav id="ioe-nav" class="ioe-nav"></nav>

<div class="page-wrap">
  <div class="login-wrap">

    <div id="loginFormView" class="login-card">
      <div class="login-icon">🔐</div>
      <div class="login-title">Masuk Akun I.O.E</div>
      <div class="login-sub">Login untuk akses fitur member resmi</div>

      <div class="form-error" id="loginError"></div>

      <input type="text" class="form-input" id="loginUsername" placeholder="Username" autocomplete="username">
      <input type="password" class="form-input" id="loginPassword" placeholder="Password" autocomplete="current-password">

      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Masuk</button>

      <div class="switch-link">
        Belum punya akun? <a href="seleksi.html">Daftar di sini</a>
      </div>
    </div>

    <div id="sessionActiveView" class="login-card session-active" style="display:none">
      <div class="icon">✅</div>
      <div class="login-title" id="welcomeName">—</div>
      <div class="login-sub" id="welcomeId">—</div>
      <button class="btn-primary" onclick="goToProfile()" style="margin-top:16px">Lihat Boarding Pass</button>
      <button class="btn-primary" onclick="doLogout()" style="margin-top:10px;background:transparent;border:1px solid var(--border);color:var(--text-muted)">Keluar Akun</button>
    </div>

  </div>
</div>

<script src="js/nav.js"></script>
<script src="js/ioe-auth.js"></script>
<script>
buildNav('login.html');

// Kalau sudah login, langsung tampilkan status alih-alih form
(function() {
  const session = getIoeSession();
  if (session) {
    document.getElementById('loginFormView').style.display = 'none';
    document.getElementById('sessionActiveView').style.display = 'block';
    document.getElementById('welcomeName').textContent = 'Halo, ' + session.nama;
    document.getElementById('welcomeId').textContent = session.memberId + ' · ' + session.rank;
  }
})();

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';

  if (!username || !password) {
    errEl.textContent = 'Username dan password wajib diisi';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true; btn.textContent = 'Memproses...';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username, password })
    });
    const data = await res.json();
    if (!data.success) {
      errEl.textContent = data.error || 'Login gagal';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Masuk';
      return;
    }
    saveIoeSession(data);
    window.location.href = 'boardingpass.html';
  } catch (e) {
    errEl.textContent = 'Gagal terhubung ke server';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Masuk';
  }
}

function goToProfile() { window.location.href = 'boardingpass.html'; }
function doLogout() {
  clearIoeSession();
  window.location.reload();
}
</script>
</body>
</html>
