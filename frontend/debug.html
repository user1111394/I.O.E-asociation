<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Device ID — I.O.E Hub</title>
<style>
  body {
    background:#04040f; color:#fff; font-family:monospace;
    padding:24px; line-height:1.8; font-size:14px;
  }
  h2 { color:#00c2ff; }
  .box {
    background:#111; border:1px solid #333; border-radius:8px;
    padding:16px; margin:12px 0; word-break:break-all;
  }
  .label { color:#888; font-size:12px; text-transform:uppercase; }
  .val { color:#00e5c0; font-size:15px; margin-top:4px; }
  .banned { color:#ff3c6e; }
  .safe { color:#00e5c0; }
</style>
</head>
<body>
<h2>🔍 Debug Device ID</h2>

<div class="box">
  <div class="label">Device ID kamu</div>
  <div class="val" id="deviceIdOut">Loading...</div>
</div>

<div class="box">
  <div class="label">Status Ban (dari server)</div>
  <div class="val" id="banStatusOut">Checking...</div>
</div>

<div class="box">
  <div class="label">Raw Response dari /api/checkban</div>
  <div class="val" id="rawOut">-</div>
</div>

<div class="box">
  <div class="label">Unban Langsung (butuh token admin)</div>
  <input type="text" id="tokenInp" placeholder="Paste token admin di sini"
    style="width:100%;padding:10px;margin-top:8px;background:#000;border:1px solid #333;color:#0f0;font-family:monospace;border-radius:6px;box-sizing:border-box;">
  <button onclick="doUnban()"
    style="width:100%;padding:12px;margin-top:10px;background:#00e5c0;color:#000;border:none;border-radius:6px;font-weight:bold;font-family:monospace;">
    🔓 UNBAN DEVICE INI
  </button>
  <div id="unbanResult" style="margin-top:10px;"></div>
</div>

<div class="box">
  <div class="label">Cek Username Akun (debug register)</div>
  <input type="text" id="userCheckInp" placeholder="Ketik username yang mau dicek"
    style="width:100%;padding:10px;margin-top:8px;background:#000;border:1px solid #333;color:#0f0;font-family:monospace;border-radius:6px;box-sizing:border-box;">
  <button onclick="checkUsername()"
    style="width:100%;padding:12px;margin-top:10px;background:#7b5cff;color:#fff;border:none;border-radius:6px;font-weight:bold;font-family:monospace;">
    🔍 CEK USERNAME INI
  </button>
  <div id="userCheckResult" style="margin-top:10px;"></div>
</div>

<script>
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function getDeviceId() {
  let cached = localStorage.getItem('ioe_device_id');
  if (cached) return { id: cached, source: 'CACHE (localStorage)' };

  const parts = [
    navigator.userAgent, navigator.language,
    screen.width + 'x' + screen.height, screen.colorDepth,
    new Date().getTimezoneOffset(), navigator.hardwareConcurrency || 'na',
    navigator.platform || 'na',
  ];
  try {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top'; ctx.font = '14px Arial';
    ctx.fillText('IOE-FP-' + parts.join('|'), 2, 2);
    parts.push(canvas.toDataURL());
  } catch(e) {}
  const raw = parts.join('###');
  const hash = await sha256(raw);
  const deviceId = 'dev_' + hash.slice(0, 24);
  return { id: deviceId, source: 'FRESH (baru di-generate)' };
}

let myDeviceId = '';

(async function() {
  const result = await getDeviceId();
  myDeviceId = result.id;
  document.getElementById('deviceIdOut').innerHTML =
    result.id + '<br><span style="color:#888;font-size:11px">(' + result.source + ')</span>';

  try {
    const res = await fetch('/api/checkban?deviceId=' + encodeURIComponent(result.id));
    const data = await res.json();
    document.getElementById('rawOut').textContent = JSON.stringify(data, null, 2);
    const statusEl = document.getElementById('banStatusOut');
    if (data.banned) {
      statusEl.innerHTML = '<span class="banned">🚫 BANNED</span><br>Alasan: ' + (data.reason || '-');
    } else {
      statusEl.innerHTML = '<span class="safe">✅ TIDAK diblokir</span>';
    }
  } catch(e) {
    document.getElementById('banStatusOut').textContent = 'Error: ' + e.message;
  }
})();

async function doUnban() {
  const token = document.getElementById('tokenInp').value.trim();
  const resultEl = document.getElementById('unbanResult');
  if (!token) { resultEl.innerHTML = '<span style="color:#ff3c6e">Masukkan token admin dulu</span>'; return; }
  resultEl.innerHTML = 'Memproses...';
  try {
    const res = await fetch('/api/ban', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'unban', token, deviceId: myDeviceId })
    });
    const d = await res.json();
    if (d.success) {
      resultEl.innerHTML = '<span style="color:#00e5c0">✅ Berhasil unban! Refresh halaman untuk verifikasi.</span>';
    } else {
      resultEl.innerHTML = '<span style="color:#ff3c6e">Gagal: ' + (d.error || 'unknown') + '</span>';
    }
  } catch(e) {
    resultEl.innerHTML = '<span style="color:#ff3c6e">Error: ' + e.message + '</span>';
  }
}

async function checkUsername() {
  const username = document.getElementById('userCheckInp').value.trim();
  const resultEl = document.getElementById('userCheckResult');
  if (!username) { resultEl.innerHTML = '<span style="color:#ff3c6e">Ketik username dulu</span>'; return; }
  resultEl.innerHTML = 'Mencari...';
  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'check-username', username })
    });
    const d = await res.json();
    if (d.exists) {
      resultEl.innerHTML =
        '<span style="color:#ff3c6e">🔴 SUDAH TERDAFTAR</span><br>' +
        'Username bersih: ' + d.cleanUsername + '<br>' +
        'Member ID: ' + d.memberId + '<br>' +
        'Nama: ' + (d.nama || '-') + '<br>' +
        'Daftar pada: ' + (d.createdAt ? new Date(d.createdAt).toLocaleString('id-ID') : '-');
    } else {
      resultEl.innerHTML = '<span style="color:#00e5c0">✅ BELUM ada yang pakai username ini (bersih: ' + d.cleanUsername + ')</span>';
    }
  } catch(e) {
    resultEl.innerHTML = '<span style="color:#ff3c6e">Error: ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
