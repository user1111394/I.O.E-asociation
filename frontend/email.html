<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Identitas I.O.E — Email Verification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .modal-box {
      background: linear-gradient(135deg, #1a1f3a 0%, #0f1629 100%);
      border: 1px solid rgba(0,229,197,0.3);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-ioe {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #00e5c0, #7b5cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h2 {
      font-size: 20px;
      color: #fff;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: #a0aec0;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      color: #cbd5e0;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .platform-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    .platform-btn {
      padding: 12px;
      border: 2px solid rgba(0,229,197,0.2);
      background: rgba(0,229,197,0.05);
      color: #cbd5e0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .platform-btn:hover {
      border-color: rgba(0,229,197,0.5);
      background: rgba(0,229,197,0.1);
    }
    .platform-btn.active {
      border-color: #00e5c0;
      background: rgba(0,229,197,0.2);
      color: #00e5c0;
    }
    .input-wrapper {
      position: relative;
    }
    .input-prefix {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #7b5cff;
      font-weight: 600;
      font-size: 14px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 12px 12px 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,229,197,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #00e5c0;
      background: rgba(0,229,197,0.1);
      box-shadow: 0 0 0 3px rgba(0,229,197,0.1);
    }
    input[type="text"]::placeholder {
      color: #718096;
    }
    .tag-preview {
      background: rgba(123,92,255,0.1);
      border: 1px dashed rgba(123,92,255,0.3);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .tag-preview.show {
      display: block;
    }
    .tag-preview-label {
      color: #a0aec0;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .tag-display {
      font-size: 18px;
      font-weight: 700;
      color: #00e5c0;
      word-break: break-all;
      font-family: 'Courier New', monospace;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #00e5c0, #7b5cff);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,229,197,0.3);
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .success-msg {
      color: #00e5c0;
      font-size: 12px;
      margin-top: 6px;
      display: none;
      text-align: center;
    }
    .success-msg.show {
      display: block;
    }
    .loading {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="logo-section">
      <div class="logo-ioe">📧</div>
      <div class="logo-text">⸢I.O.E⸥</div>
    </div>

    <h2>Dapatkan Identitas I.O.E</h2>
    <p class="subtitle">
      Verifikasi akun sosial media kamu dan dapatkan tag unik I.O.E yang bisa digunakan di semua platform.
    </p>

    <form id="emailForm">
      <div class="form-group">
        <label class="form-label">Pilih Platform</label>
        <div class="platform-select">
          <button type="button" class="platform-btn active" data-platform="tiktok">
            🎵 TikTok
          </button>
          <button type="button" class="platform-btn" data-platform="instagram">
            📸 Instagram
          </button>
          <button type="button" class="platform-btn" data-platform="discord">
            💬 Discord
          </button>
          <button type="button" class="platform-btn" data-platform="twitter">
            𝕏 Twitter
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" id="usernameLabel">Username TikTok</label>
        <div class="input-wrapper">
          <span class="input-prefix" id="inputPrefix">@</span>
          <input 
            type="text" 
            id="usernameInput" 
            placeholder="username_kamu"
            maxlength="30"
            autocomplete="off"
          >
        </div>
        <div class="error-msg" id="errorMsg"></div>
      </div>

      <div class="tag-preview" id="tagPreview">
        <div class="tag-preview-label">Preview Tag Kamu</div>
        <div class="tag-display" id="tagDisplay"></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Verifikasi & Dapatkan Tag
      </button>
      <div class="success-msg" id="successMsg"></div>
    </form>
  </div>
</div>

<script src="js/email.js"></script>

</body>
</html>
